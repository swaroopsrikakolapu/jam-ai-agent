version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: jam_agent_db
      POSTGRES_USER: jam_user
      POSTGRES_PASSWORD: jam_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
